name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download ML models
        run: bun run download-models

      - name: Build extension
        run: bun run build

      - name: Pack Chrome Web Store ZIP
        run: |
          cd dist
          zip -r ../aeo-score-calculator-store.zip .
          cd ..

      - name: Pack Sideloading ZIP
        run: |
          cd dist
          zip -r ../aeo-score-calculator-sideload.zip .
          cd ..

      - name: Check CRX key availability
        id: crx-check
        run: |
          if [ -n "${{ secrets.CRX_PRIVATE_KEY }}" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack CRX for Sideloading
        if: steps.crx-check.outputs.has_key == 'true'
        run: |
          echo "$CRX_PRIVATE_KEY" > crx-key.pem
          npx --yes crx pack dist \
            --key crx-key.pem \
            --crx-output aeo-score-calculator-sideload.crx
          rm crx-key.pem
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          body: |
            ## AEO Score Calculator ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}

            Chrome Manifest V3 extension that scores webpages for SEO, GEO, LLMO & AEO.

            ### Downloads

            | Package | Use Case |
            |---------|----------|
            | `aeo-score-calculator-store.zip` | Upload to Chrome Web Store |
            | `aeo-score-calculator-sideload.crx` | Direct install via drag-and-drop |
            | `aeo-score-calculator-sideload.zip` | Load unpacked (developer mode) |

            ### Installation

            **Chrome Web Store**
            1. Upload `aeo-score-calculator-store.zip` to the Chrome Web Store Developer Dashboard

            **Sideloading (CRX)**
            1. Download `aeo-score-calculator-sideload.crx`
            2. Drag the `.crx` file onto `chrome://extensions/`

            **Developer Mode (Unpacked)**
            1. Unzip `aeo-score-calculator-sideload.zip`
            2. Open `chrome://extensions/`
            3. Enable **Developer mode**
            4. Click **Load unpacked** and select the unzipped folder

            ### Changes
            - 4-category scoring engine (AEO, SEO, GEO, LLMO)
            - Tabbed dashboard with category-specific breakdowns
            - Actionable suggestions ranked by severity
            - Offline-ready with bundled models (~88 MB)

            [Full Changelog](https://github.com/${{ github.repository }}/compare/${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }})
          files: |
            aeo-score-calculator-store.zip
            aeo-score-calculator-sideload.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach CRX to Release
        if: steps.crx-check.outputs.has_key == 'true' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          files: |
            aeo-score-calculator-sideload.crx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
